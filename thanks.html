<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answers submitted</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Arial, Helvetica, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 10% 10%, rgba(255,79,216,0.35), transparent 22%),
        radial-gradient(circle at 90% 20%, rgba(34,211,238,0.28), transparent 24%),
        radial-gradient(circle at 30% 90%, rgba(245,158,11,0.20), transparent 24%),
        linear-gradient(135deg, #1a103d, #0f2d52 45%, #0f172a);
    }

    .card{
      width:min(700px, 100%);
      padding:36px 28px;
      border-radius:28px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(16px);
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      margin-bottom:14px;
      font-weight:700;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(2rem, 4vw, 3.3rem);
      line-height:1.15;
    }

    p{
      margin:0;
      color:#e0f2fe;
      line-height:1.7;
      font-size:1.05rem;
    }

    .small{
      margin-top:14px;
      font-size:0.95rem;
      color:#cbd5e1;
    }

    .name{
      background:linear-gradient(90deg, #ff4fd8, #22d3ee);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Submitted ✅</div>
    <h1 id="thankYouText">Thanks! The answers will be revealed shortly 👀</h1>
    <p>Your response has been recorded successfully.</p>
    <p class="small">Watch the group chat for the reveal.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    if (name) {
      document.getElementById("thankYouText").innerHTML =
        `Thanks <span class="name">${name}</span>, the answers will be revealed shortly 👀`;
    }
  </script>
</body>
</html>
