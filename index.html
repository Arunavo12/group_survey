<script type="module">
  import { db } from "./firebase-config.js";
  import {
    doc,
    getDoc,
    setDoc,
    updateDoc,
    increment,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const allNames = [
    "Tulika",
    "Eric",
    "Novo",
    "Radha",
    "Ayushi",
    "Arijit",
    "Abhijit",
    "Srijon",
    "Biona",
    "Boshuda",
    "Anik",
    "Aman",
    "Aush",
    "Sushi",
    "Liekha"
  ];

  const sections = [
    {
      title: "Personality",
      subtitle: "Core aura, vibes, and how people see each other.",
      questions: [
        "Who has the most aura?",
        "Who has the highest IQ?",
        "Who is the most nonchalant 😐",
        "Who is the biggest overthinker?",
        "Who has main character energy?",
        "Who acts innocent but definitely isn’t?",
        "Who has the best drip?",
        "Who is always late?",
        "Who is the biggest hype person?"
      ]
    },
    {
      title: "Chaos",
      subtitle: "",
      questions: [
        "Who is the biggest ragebaiter 😭",
        "Who would argue even if they’re wrong?",
        "Who is the biggest instigator?",
        "Who is most likely to gaslight the group?",
        "Who leaves people on delivered the longest?",
        "Who laughs during serious moments?"
      ]
    },
    {
      title: "Life Predictions",
      subtitle: "Who’s actually making it, fumbling it, or somehow both.",
      questions: [
        "Who is most likely to be successful?",
        "Who is the most street smart?",
        "Who is the most book smart?",
        "Who gives the best advice?",
        "Who gives the worst advice?",
        "Who is most likely to get rich?",
        "Who is most likely to get cancelled?",
        "Who would you wanna be for 24 hours?",
        "If everyone was the same age, who is most likely to get married first?"
      ]
    },
    {
      title: "Public Embarrassment",
      subtitle: "Unfortunate scenes",
      questions: [
        "Who would get caught doing something embarrassing?",
        "Who is most likely to trip in public?",
        "Who is most likely to get rejected?",
        "Who would fold under 0 pressure?",
        "Who is most likely to embarrass the group in public?"
      ]
    },
    {
      title: "For the chaos...",
      subtitle: "I apologise in advance...",
      questions: [
        "Who thinks they’re better than everyone else? 😭",
        "Who is the biggest attention seeker?",
        "Who would snitch first in a serious situation?",
        "Who has the worst takes in the group?",
        "Who is the most fake nice?",
        "Who acts the toughest but isn’t?",
        "Who would switch up the fastest?",
        "Who is the biggest hypocrite?",
        "Who thinks they’re always right?",
        "Who is the biggest snake?",
        "Who is the meanest?"
      ]
    }
  ];

  const flattenedQuestions = [];
  sections.forEach((section, sIndex) => {
    section.questions.forEach((question, qIndex) => {
      flattenedQuestions.push({
        id: `q${flattenedQuestions.length + 1}`,
        text: question,
        sectionIndex: sIndex,
        questionIndex: qIndex
      });
    });
  });

  const TOTAL_QUESTIONS = flattenedQuestions.length;

  const nameSelect = document.getElementById("personName");
  const questionsContainer = document.getElementById("questionsContainer");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");
  const submitBtn = document.getElementById("submitBtn");
  const progressText = document.getElementById("progressText");
  const progressPercent = document.getElementById("progressPercent");
  const progressFill = document.getElementById("progressFill");
  const surveyForm = document.getElementById("surveyForm");

  allNames.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    nameSelect.appendChild(option);
  });

  function renderQuestions() {
    let globalQuestionNumber = 1;

    sections.forEach((section, sectionIndex) => {
      const sectionWrap = document.createElement("div");
      sectionWrap.className = "section";

      sectionWrap.innerHTML = `
        <h2 class="section-title">${section.title}</h2>
        <p class="section-sub">${section.subtitle}</p>
        <div class="grid" id="section-grid-${sectionIndex}"></div>
      `;

      questionsContainer.appendChild(sectionWrap);

      const grid = sectionWrap.querySelector(`#section-grid-${sectionIndex}`);

      section.questions.forEach((questionText) => {
        const questionId = `q${globalQuestionNumber}`;

        const card = document.createElement("div");
        card.className = "q-card locked";
        card.dataset.questionId = questionId;
        card.dataset.questionNumber = globalQuestionNumber;

        card.innerHTML = `
          <div class="q-number">Question ${globalQuestionNumber}</div>
          <label for="${questionId}">${questionText}</label>
          <select id="${questionId}" required disabled>
            <option value="">Choose someone</option>
          </select>
        `;

        grid.appendChild(card);
        globalQuestionNumber++;
      });
    });
  }

  function showError(message) {
    errorBox.textContent = message;
    errorBox.style.display = "block";
    successBox.style.display = "none";
  }

  function showSuccess(message) {
    successBox.textContent = message;
    successBox.style.display = "block";
    errorBox.style.display = "none";
  }

  function hideMessages() {
    errorBox.style.display = "none";
    successBox.style.display = "none";
  }

  function fillDropdown(selectId, names) {
    const select = document.getElementById(selectId);
    const currentValue = select.value;

    select.innerHTML = '<option value="">Choose someone</option>';
    names.forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      select.appendChild(option);
    });

    if (names.includes(currentValue)) {
      select.value = currentValue;
    } else {
      select.value = "";
    }
  }

  function getFirstUnansweredIndex() {
    for (let i = 0; i < flattenedQuestions.length; i++) {
      const select = document.getElementById(flattenedQuestions[i].id);
      if (!select.value) return i;
    }
    return -1;
  }

  function scrollToQuestion(index) {
    if (index < 0 || index >= flattenedQuestions.length) return;
    const select = document.getElementById(flattenedQuestions[index].id);
    const card = select.closest(".q-card");

    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    setTimeout(() => {
      if (!select.disabled) {
        select.focus();
      }
    }, 350);
  }

  function updateSequentialLocks() {
    const currentUser = nameSelect.value;
    const availableNames = allNames.filter(name => name !== currentUser);

    flattenedQuestions.forEach((q, index) => {
      const select = document.getElementById(q.id);
      const card = select.closest(".q-card");

      fillDropdown(q.id, currentUser ? availableNames : []);

      let shouldEnable = false;

      if (currentUser) {
        if (index === 0) {
          shouldEnable = true;
        } else {
          const prevSelect = document.getElementById(flattenedQuestions[index - 1].id);
          shouldEnable = !!prevSelect.value;
        }
      }

      if (!shouldEnable) {
        select.disabled = true;
        if (select.value) select.value = "";
      } else {
        select.disabled = false;
      }

      card.classList.toggle("answered", !!select.value);
      card.classList.toggle("locked", select.disabled);
      card.classList.remove("current");
    });

    const firstUnansweredIndex = getFirstUnansweredIndex();
    if (firstUnansweredIndex !== -1 && nameSelect.value) {
      const currentCard = document
        .getElementById(flattenedQuestions[firstUnansweredIndex].id)
        .closest(".q-card");
      currentCard.classList.add("current");
    }
  }

  function updateProgress() {
    let answered = 0;

    flattenedQuestions.forEach(q => {
      const val = document.getElementById(q.id).value;
      if (val) answered++;
    });

    const percent = Math.round((answered / TOTAL_QUESTIONS) * 100);
    progressText.textContent = `${answered} / ${TOTAL_QUESTIONS} answered`;
    progressPercent.textContent = `${percent}%`;
    progressFill.style.width = `${percent}%`;

    if (!nameSelect.value) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Select your name first";
    } else if (answered < TOTAL_QUESTIONS) {
      submitBtn.disabled = true;
      submitBtn.textContent = `Can't submit - answer all questions (${answered}/${TOTAL_QUESTIONS})`;
    } else {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit My Answers";
    }
  }

  function updateAllUI() {
    updateSequentialLocks();
    updateProgress();
  }

  renderQuestions();
  updateProgress();

  nameSelect.addEventListener("change", () => {
    hideMessages();
    updateAllUI();
    if (nameSelect.value) {
      scrollToQuestion(0);
    }
  });

  document.addEventListener("change", (e) => {
    if (!e.target || !e.target.matches("select")) return;
    if (e.target.id === "personName") return;

    hideMessages();
    updateAllUI();
  });

  surveyForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const currentUser = nameSelect.value;
    if (!currentUser) {
      showError("Please select your name first.");
      nameSelect.scrollIntoView({ behavior: "smooth", block: "center" });
      nameSelect.focus();
      return;
    }

    const firstUnansweredIndex = getFirstUnansweredIndex();
    if (firstUnansweredIndex !== -1) {
      showError("Can't submit - you haven't answered all the questions yet.");
      scrollToQuestion(firstUnansweredIndex);
      return;
    }

    const answers = {};
    for (const q of flattenedQuestions) {
      const value = document.getElementById(q.id).value;

      if (!value) {
        showError("Can't submit - you haven't answered all the questions yet.");
        const idx = flattenedQuestions.findIndex(item => item.id === q.id);
        scrollToQuestion(idx);
        return;
      }

      if (value === currentUser) {
        showError("You can’t vote for yourself.");
        const idx = flattenedQuestions.findIndex(item => item.id === q.id);
        scrollToQuestion(idx);
        return;
      }

      answers[q.id] = value;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    try {
      const responseRef = doc(db, "responses", currentUser.toLowerCase());
      const existing = await getDoc(responseRef);

      if (existing.exists()) {
        showError("This name has already submitted a response.");
        updateProgress();
        return;
      }

      await setDoc(responseRef, {
        user: currentUser,
        answers,
        submittedAt: serverTimestamp()
      });

      for (const [qKey, answer] of Object.entries(answers)) {
        const totalsRef = doc(db, "questionTotals", qKey);
        await setDoc(totalsRef, { counts: {} }, { merge: true });
        await updateDoc(totalsRef, {
          [`counts.${answer}`]: increment(1)
        });
      }

      showSuccess("Submitted successfully. Sending you to the waiting page...");
      setTimeout(() => {
        window.location.href = `thanks.html?name=${encodeURIComponent(currentUser)}`;
      }, 900);
    } catch (err) {
      console.error(err);
      showError("Something went wrong while submitting. Try again.");
      updateProgress();
    }
  });
</script>
