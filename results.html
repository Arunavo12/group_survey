<script type="module">
  import { db } from "./firebase-config.js";
  import {
    doc,
    getDoc,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const questions = [
    "Who has the most aura?",
    "Who is the smartest?",
    "Who is the most chaotic?",
    "Who is the most nonchalant 😐",
    "Who is the biggest overthinker?",
    "Who is the most delusional (in a good way)?",
    "Who has main character energy?",
    "Who is the most mysterious?",
    "Who is secretly the funniest but doesn’t try?",
    "Who acts innocent but definitely isn’t?",

    "Who is the biggest ragebaiter 😭",
    "Who starts the most arguments?",
    "Who would argue even if they’re wrong?",
    "Who is the biggest instigator?",
    "Who is most likely to gaslight the group?",
    "Who disappears mid-convo the most?",
    "Who replies the driest?",
    "Who leaves people on delivered the longest?",
    "Who switches sides in arguments?",
    "Who would accidentally expose the group chat?",

    "Who is most likely to be successful?",
    "Who is the most street smart?",
    "Who is the most book smart?",
    "Who gives the best advice?",
    "Who gives the worst advice?",
    "Who is most likely to get rich?",
    "Who is most likely to get cancelled?",
    "Who is most likely to go viral?",
    "Who is most likely to win the lottery but lose the ticket?",
    "Who survives purely off luck?",

    "Who is balding first 😭",
    "Who is aging the fastest?",
    "Who would get caught doing something embarrassing?",
    "Who would laugh at the worst possible time?",
    "Who is most likely to trip in public?",
    "Who is most likely to get rejected?",
    "Who would fold under pressure?",
    "Who would survive longest in a zombie apocalypse?",
    "Who is most likely to embarrass the group in public?",
    "Who laughs during serious moments?",

    "Who thinks they’re better than everyone else? 😭",
    "Who is the biggest attention seeker?",
    "Who would snitch first in a serious situation?",
    "Who has the worst takes in the group?",
    "Who is the most fake nice?",
    "Who acts the toughest but isn’t?",
    "Who would switch up the fastest?",
    "Who is the biggest hypocrite?",
    "Who thinks they’re always right?",
    "Who is the most likely to betray the group for personal gain?"
  ];

  async function loadResults() {
    const settingsRef = doc(db, "settings", "main");
    const settingsSnap = await getDoc(settingsRef);

    const revealed = settingsSnap.exists() && settingsSnap.data().resultsRevealed === true;

    if (!revealed) {
      document.getElementById("loadingText").textContent = "Results are still hidden.";
      return;
    }

    const lockedMessage = document.getElementById("lockedMessage");
    const resultsGrid = document.getElementById("resultsGrid");

    const querySnapshot = await getDocs(collection(db, "responses"));
    const responses = querySnapshot.docs.map(docSnap => docSnap.data());

    lockedMessage.style.display = "none";
    resultsGrid.style.display = "grid";
    resultsGrid.innerHTML = "";

    let index = 0;

    for (let i = 1; i <= questions.length; i++) {
      const qid = `q${i}`;
      const votes = {};

      responses.forEach((data) => {
        const chosen = data[qid] || data.answers?.[qid];
        if (!chosen) return;

        if (!votes[chosen]) {
          votes[chosen] = 0;
        }
        votes[chosen] += 1;
      });

      const entries = Object.entries(votes).sort((a, b) => b[1] - a[1]);

      const winnerText = entries.length
        ? `Winner: ${entries[0][0]} (${entries[0][1]} vote${entries[0][1] === 1 ? "" : "s"})`
        : "No votes yet";

      const card = document.createElement("div");
      card.className = "card";
      const canvasId = `chart-${index++}`;

      card.innerHTML = `
        <h3>Q${i}. ${questions[i - 1]}</h3>
        <div class="winner">${winnerText}</div>
        <canvas id="${canvasId}"></canvas>
      `;

      resultsGrid.appendChild(card);

      if (entries.length > 0) {
        new Chart(document.getElementById(canvasId), {
          type: "pie",
          data: {
            labels: entries.map(entry => entry[0]),
            datasets: [{
              data: entries.map(entry => entry[1]),
              backgroundColor: [
                "#ff4fd8",
                "#22d3ee",
                "#f59e0b",
                "#7c3aed",
                "#10b981",
                "#ef4444",
                "#3b82f6",
                "#f97316",
                "#14b8a6",
                "#e879f9",
                "#84cc16",
                "#fb7185",
                "#6366f1",
                "#06b6d4",
                "#facc15"
              ],
              borderColor: "#ffffff",
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  color: "#111827"
                }
              }
            }
          }
        });
      }
    }
  }

  loadResults().catch(err => {
    console.error(err);
    document.getElementById("loadingText").textContent = "Couldn’t load results yet.";
  });
</script>
